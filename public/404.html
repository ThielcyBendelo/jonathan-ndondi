<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Risque non répertorié</title>
    <style>
      :root {
        --midnight-blue: #191970;
        --deep-slate: #0f172a;
        --orange-main: #f97316;
      }
      body {
        background: var(--deep-slate);
        color: #fff;
        font-family: 'Playfair Display', serif, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }
      .container {
        border-left: 4px solid var(--orange-main);
        padding-left: 2rem;
        max-width: 500px;
      }
      h1 {
        font-size: 6rem;
        margin: 0;
        color: var(--orange-main);
        font-weight: 200;
        letter-spacing: -2px;
      }
      h2 {
        font-size: 1.5rem;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        margin: 0.5rem 0;
        font-family: sans-serif;
        font-weight: 900;
        color: #ffffff;
      }
      p {
        font-size: 1rem;
        margin-top: 1rem;
        color: #94a3b8;
        font-style: italic;
        line-height: 1.6;
      }
      .btn-home {
        display: inline-block;
        margin-top: 3rem;
        background: var(--orange-main);
        color: #fff;
        text-decoration: none;
        padding: 1rem 2rem;
        font-size: 0.7rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        transition: all 0.3s ease;
        box-shadow: 0 10px 30px rgba(249, 115, 22, 0.2);
      }
      .btn-home:hover {
        background: #ea580c;
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(249, 115, 22, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Périmètre non défini</h2>
      <p>La ressource que vous recherchez est actuellement hors de notre champ d'analyse ou a été déplacée.</p>
      <a href="/" class="btn-home">Retour au Cabinet</a>
    </div>
  </body>
</html>
