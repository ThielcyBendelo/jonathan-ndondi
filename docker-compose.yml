version: '3.8'

services:
  # Application React
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ibramus-web
    ports:
      - '80:80'
    environment:
      - NODE_ENV=production
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - monsite-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend optionnel (API)
  api:
    image: node:18-alpine
    container_name: monsite-api
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
    command: npm start
    restart: unless-stopped
    networks:
      - monsite-network
    depends_on:
      - app
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  monsite-network:
    driver: bridge

volumes:
  node_modules:
